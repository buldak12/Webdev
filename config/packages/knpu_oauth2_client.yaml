# Google OAuth client configuration
# See: https://github.com/knpuniversity/oauth2-client-bundle

knpu_oauth2_client:
    clients:
        # Staff Google OAuth (existing accounts only)
        google:
            type: google
            client_id: '%env(GOOGLE_CLIENT_ID)%'
            client_secret: '%env(GOOGLE_CLIENT_SECRET)%'
            redirect_route: oauth_google_check
            redirect_params: {}
            access_type: online

        # Customer Google OAuth (login or register)
        google_customer:
            type: google
            client_id: '%env(GOOGLE_CLIENT_ID)%'
            client_secret: '%env(GOOGLE_CLIENT_SECRET)%'
            redirect_route: oauth_google_customer_check
            redirect_params: {}
            access_type: online
